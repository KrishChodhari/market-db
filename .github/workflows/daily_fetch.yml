name: Market Data Sync

on:
  schedule:
    - cron: '0 0 * * *'  # Runs every night at midnight UTC
  workflow_dispatch:      # Allows you to click a button to run it manually

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # Required to push the JSON data back to the repo
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install requests python-dotenv

      - name: Run Fetch Script
        env:
          ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
          TWELVE_DATA_KEY: ${{ secrets.TWELVE_DATA_KEY }}
        run: python scripts/fetch_data.py

      - name: Commit and Push Data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          # Only commit if there are actually changes to the data
          git commit -m "Auto-sync market data: $(date -d 'yesterday' +'%Y-%m-%d')" || echo "No changes to commit"
          git push